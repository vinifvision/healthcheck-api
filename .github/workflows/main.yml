name: CI Pipeline - Telemetry API

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixando o código do repositório
        uses: actions/checkout@v3

      - name: 2. Configurando o Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 3. Instalando dependências e Linter
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: 4. Rodando o Linter (Análise de Código)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 5. Testando o Build do Docker
        run: docker build -t telemetry-api:test .
